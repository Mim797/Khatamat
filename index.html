            const allSurahs = state.data.flatMap(k => k.surahs).filter(s => s.isDone && s.completedAt);
            if (allSurahs.length === 0) return 0;
            
            const completionDates = [...new Set(allSurahs.map(s => new Date(s.completedAt).toDateString()))]
                .map(d => new Date(d).getTime())
                .sort((a, b) => b - a);

            let streak = 0;
            let current = new Date().setHours(0,0,0,0);
            
            for (let date of completionDates) {
                if (date === current || date === current - 86400000) {
                    streak++;
                    current = date;
                } else {
                    break;
                }
            }
            return streak;
        }

        // Logic for Feature 5 (Allocation)
        function getTodaysPortion(k) {
            if (!k.deadline || k.isCompleted) return [];
            const remaining = k.surahs.filter(s => !s.isDone);
            if (remaining.length === 0) return [];

            const daysLeft = Math.ceil((new Date(k.deadline) - new Date()) / 86400000);
            if (daysLeft <= 0) return remaining.map(s => s.id); // Read all if deadline passed

            const pagesLeft = remaining.reduce((acc, s) => acc + s.pages, 0);
            const pagesPerDay = Math.ceil(pagesLeft / daysLeft);

            let portion = [];
            let pagesSum = 0;
            for (let s of remaining) {
                if (pagesSum < pagesPerDay) {
                    portion.push(s.id);
                    pagesSum += s.pages;
                } else break;
            }
            return portion;
        }

                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border-2 border-slate-100 text-center">
                            <div class="text-3xl font-black text-amber-500">${state.data.filter(x=>x.isCompleted).length}</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-1">ختمات كاملة</div>
                        </div>
                    </div>
                    
                    <div class="p-6 bg-white border-2 border-slate-100 rounded-[2.5rem]">
                        <h3 class="font-black text-xs text-slate-400 uppercase mb-4">بياناتك الشخصية</h3>
                        <div class="space-y-3">
                            <button onclick="exportData()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm">تصدير نسخة احتياطية</button>
                            <button onclick="document.getElementById('fileIn').click()" class="w-full py-4 bg-slate-100 text-slate-900 rounded-2xl font-black text-sm border-2 border-slate-200">استيراد بيانات</button>
                            <input type="file" id="fileIn" class="hidden" onchange="importData(event)">
                        </div>
                    </div>
                </div>
            `;
        }

        function renderModal() {
            return `
                <div class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm animate-pop">
                    <form onsubmit="confirmAction(event)" class="bg-white p-8 rounded-[3rem] w-full max-w-sm shadow-2xl space-y-6 mb-10 sm:mb-0">
                        <div class="text-center">
                            <h3 class="text-2xl font-black">تأكيد الإنجاز</h3>
                            <p class="text-slate-400 text-xs mt-2">سيتم تسجيل إتمام ${state.modal.ids.length} سورة</p>
                        </div>
                        <div class="space-y-4">
                            <input type="datetime-local" id="modalDate" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 px-4 font-bold text-sm outline-none focus:border-emerald-500">
                            <input type="text" id="modalInput" required placeholder="اكتب '${state.modal.type}' للتأكيد" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-5 text-center text-lg font-black outline-none focus:border-emerald-500">
                        </div>
                        <div class="flex gap-4">
                            <button type="button" onclick="state.modal.show=false; render()" class="flex-1 py-4 font-bold text-slate-400">تراجع</button>
                            <button type="submit" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">تأكيد</button>
                        </div>
                    </form>
                </div>
            `;
        }

        // Action Handlers
        function handleSurahClick(id) {
            if (state.isMulti) {
                if (state.selected.includes(id)) state.selected = state.selected.filter(x => x !== id);
                else state.selected.push(id);
            } else {
                const k = state.data.find(x => x.id === state.activeKhatmah);
                const s = k.surahs.find(x => x.id === id);
                state.modal = { show: true, ids: [id], type: s.isDone ? 'الغاء' : 'تم' };
            }
            render();
        }

        function confirmAction(e) {
            e.preventDefault();
            const val = document.getElementById('modalInput').value;
            if (val !== state.modal.type) return;

            const customTs = document.getElementById('modalDate').value ? new Date(document.getElementById('modalDate').value).getTime() : Date.now();
            const kIdx = state.data.findIndex(k => k.id === state.activeKhatmah);
            const k = state.data[kIdx];

            state.modal.ids.forEach(id => {
                const s = k.surahs.find(x => x.id === id);
                if (state.modal.type === 'تم') {
                    if (!s.isDone) {
                        s.isDone = true;
                        s.completedAt = customTs;
                        if (!k.startedAt || customTs < k.startedAt) k.startedAt = customTs;
                        const prevs = k.surahs.filter(x => x.isDone && x.id !== id && x.completedAt < customTs).sort((a,b)=>b.completedAt - a.completedAt);
                        s.durationMs = prevs.length ? customTs - prevs[0].completedAt : 0;
                    }
                } else {
                    s.isDone = false; s.completedAt = null; s.durationMs = null;
                }
            });

            k.isCompleted = k.surahs.every(s => s.isDone);
            if (k.isCompleted) {
                k.completedAt = Math.max(...k.surahs.map(s => s.completedAt));
                if (kIdx < 99) state.data[kIdx+1].isLocked = false;
            }

            state.modal.show = false; state.isMulti = false; state.selected = [];
            saveState();
        }

        function setDeadline() {
            const date = document.getElementById('deadlineInput').value;
            const k = state.data.find(x => x.id === state.activeKhatmah);
            k.deadline = date;
            state.view = 'home';
            saveState();
        }

        function formatTimeDiff(ms) {
            if (!ms) return '0 د';
            const m = Math.floor((ms / 60000) % 60);
            const h = Math.floor((ms / 3600000) % 24);
            const d = Math.floor(ms / 86400000);
            if (d > 0) return `${d} يوم`;
            if (h > 0) return `${h} ساعة`;
            return `${m} دقيقة`;
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state.data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `khatmah_backup.json`; a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.data = JSON.parse(ev.target.result);
                saveState();
                alert('تم استيراد البيانات');
            };
            reader.readAsText(file);
        }

        // Initialize
        render();
    </script>
</body>
</html>
